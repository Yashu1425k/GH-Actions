name: This is a testing of github workflow pipeline
on:
  workflow_dispatch:
      inputs:
        username:
          description: "Enter your name"
          required: true
          default: dummy-user

jobs:
  hello-user:
    runs-on: ubuntu-latest
    steps:
    - name: Checking out the source code
      run: echo "Hello ${{ github.event.inputs.username }}"
  welcome-user:
    runs-on: ubuntu-latest
    needs: hello-user
    environment: prod
    steps:
    - name: Printing Welcome to user
      run: echo "Welcome ${{github.event.inputs.username}} to the Github workflow"
  
